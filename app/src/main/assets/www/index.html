<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Reelio</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #05050A;
      overflow-x: hidden
    }

    #root {
      width: 100%;
      min-height: 100vh
    }

    body {
      font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif
    }

    .mono {
      font-family: 'Share Tech Mono', 'Courier New', monospace
    }

    .spacemono {
      font-family: 'Space Mono', monospace
    }

    .app-shell {
      width: 100%;
      min-height: 100vh;
      background: #05050A;
      color: #D0DCF0;
      position: relative;
      overflow: hidden;
      max-width: 500px;
      margin: 0 auto;
    }

    /* Prevent Android long-press text selection on display UI */
    .app-shell,
    .app-shell * {
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    .app-shell input,
    .app-shell textarea,
    .app-shell select {
      -webkit-user-select: text;
      user-select: text;
      -webkit-touch-callout: default;
    }

    /* Cyber grid */
    .app-shell::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(to right, rgba(13, 223, 242, 0.04) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(13, 223, 242, 0.04) 1px, transparent 1px);
      background-size: 20px 20px;
      pointer-events: none;
      z-index: 0;
    }

    /* Top bloom */
    .app-shell::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 180px;
      background: linear-gradient(to bottom, rgba(13, 223, 242, 0.06), transparent);
      pointer-events: none;
      z-index: 0;
    }

    /* Scanlines */
    .scanlines {
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0) 50%, rgba(0, 0, 0, 0.07) 50%);
      background-size: 100% 4px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.35;
    }

    @keyframes pulse-dot {

      0%,
      100% {
        opacity: 1;
        transform: scale(1)
      }

      50% {
        opacity: .4;
        transform: scale(.8)
      }
    }

    @keyframes ring-out {
      0% {
        transform: scale(1);
        opacity: .7
      }

      100% {
        transform: scale(1.8);
        opacity: 0
      }
    }

    @keyframes slide-up {
      from {
        opacity: 0;
        transform: translateY(16px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes scan-line {
      0% {
        top: -2px
      }

      100% {
        top: 100%
      }
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-3px)
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    @keyframes spin-reverse {
      to {
        transform: rotate(-360deg)
      }
    }

    @keyframes ping-slow {

      0%,
      100% {
        transform: scale(1);
        opacity: .75
      }

      50% {
        transform: scale(1.6);
        opacity: 0
      }
    }

    .pulse {
      animation: pulse-dot 2s ease-in-out infinite
    }

    .slide-up {
      animation: slide-up .5s ease both
    }

    .float {
      animation: float 3s ease-in-out infinite
    }

    .ping {
      animation: ping-slow 2s ease-in-out infinite
    }

    .scan {
      position: absolute;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(13, 223, 242, 0.5), transparent);
      animation: scan-line 5s linear infinite;
      pointer-events: none;
    }

    /* Base card */
    .card {
      background: rgba(10, 17, 20, 0.85);
      border: 1px solid rgba(13, 223, 242, 0.12);
      border-radius: 16px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      position: relative;
      overflow: hidden;
    }

    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(13, 223, 242, 0.03) 0%, transparent 60%);
      pointer-events: none;
      border-radius: inherit;
    }

    /* Magenta doom card */
    .card-doom {
      background: rgba(26, 11, 21, 0.85);
      border-color: rgba(242, 13, 166, 0.35);
    }

    .card-doom::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #f20da6, transparent);
      opacity: .7;
    }

    /* Red danger card */
    .card-danger {
      border-color: rgba(255, 45, 85, 0.35)
    }

    .card-danger::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #FF2D55, transparent);
      opacity: .5;
    }

    ::-webkit-scrollbar {
      width: 3px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: #8899AA;
      border-radius: 2px
    }

    .btn-primary {
      width: 100%;
      padding: 18px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: .03em;
      background: linear-gradient(135deg, #0ddff2, #00B8A4);
      color: #020A0A;
      position: relative;
      overflow: hidden;
      transition: transform .15s ease;
      box-shadow: 0 8px 32px rgba(13, 223, 242, 0.25);
    }

    .btn-primary:active {
      transform: scale(.98)
    }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 3px;
      border-radius: 2px;
      background: rgba(13, 223, 242, 0.2);
      outline: none;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #0ddff2;
      box-shadow: 0 0 10px #0ddff2;
      cursor: pointer;
    }

    .tab-bar {
      position: sticky;
      bottom: 0;
      background: rgba(5, 5, 10, 0.97);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(13, 223, 242, 0.1);
      display: flex;
    }

    .tab-item {
      flex: 1;
      padding: 12px 8px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
      border: none;
      background: transparent;
      color: #8899AA;
      font-family: 'Space Grotesk';
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .05em;
      transition: color .2s;
    }

    .tab-item.active {
      color: #0ddff2
    }

    .tab-item.active svg {
      filter: drop-shadow(0 0 6px #0ddff2)
    }

    /* Driver progress bar */
    .driver-bar {
      height: 5px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 3px;
      overflow: hidden;
    }

    .driver-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 1s ease
    }

    * {
      -webkit-tap-highlight-color: transparent;
    }

    .ripple-surface {
      position: relative;
      overflow: hidden;
    }

    .ripple-surface::after {
      content: "";
      display: block;
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
      background-image: radial-gradient(circle, rgba(255, 255, 255, 0.4) 10%, transparent 10.01%);
      background-repeat: no-repeat;
      background-position: 50%;
      transform: scale(10, 10);
      opacity: 0;
      transition: transform .5s, opacity 1s;
    }

    .ripple-surface:active::after {
      transform: scale(0, 0);
      opacity: 1;
      transition: 0s;
    }
  </style>
</head>

<body>
  <div id="root">
    <div
      style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#05050A;gap:16px">
      <div
        style="width:40px;height:40px;border:3px solid rgba(13,223,242,0.15);border-top-color:#0ddff2;border-radius:50%;animation:spin .8s linear infinite">
      </div>
      <div class="mono" style="color:#8899AA;font-size:11px;letter-spacing:.2em">REELIO</div>
    </div>
  </div>
  <script src="react.min.js"></script>
  <script src="react-dom.min.js"></script>
  <script>
    (function () {
      'use strict';
      var e = React.createElement, useState = React.useState, useEffect = React.useEffect;

      /* ── Design tokens ── */
      var D = {
        bg: "#05050A", doom: "#FF2D55", doomMag: "#f20da6",
        safe: "#0ddff2", warn: "#FFB340", violet: "#BF5AF2", blue: "#0A84FF",
        text: "#D0DCF0", muted: "#8899AA",
        border: "rgba(13, 223, 242, 0.12)",
        borderDoom: "rgba(242, 13, 166, 0.35)",
        borderDanger: "rgba(255, 45, 85, 0.35)"
      };

      var RH = {
        screenHome: "0 16px 24px",
        screenStandard: "16px 16px 32px",
        section: 16,
        card: 12,
        cardHeader: 12
      };

      class AppErrorBoundary extends React.Component {
        constructor(props) { super(props); this.state = { error: null }; }
        componentDidCatch(err) { this.setState({ error: err.toString() + "\n" + err.stack }); }
        render() {
          if (this.state.error) {
            return React.createElement("pre", {
              style: { color: "#FF2D55", padding: 16, fontSize: 10, background: "#05050A", minHeight: "100vh", whiteSpace: "pre-wrap", wordBreak: "break-all", fontFamily: "monospace" }
            }, "CRASH:\n" + this.state.error);
          }
          return this.props.children;
        }
      }

      var THRESHOLDS = { doom: 0.55, moderate: 0.35 };

      // === MODEL THRESHOLDS (CANONICAL SOURCE) ===
      var MODEL_THRESHOLDS = {
        doomLabel: 0.55,
        moderateLabel: 0.35,
        circadianHigh: 0.65,
        dominanceThreshold: 0.5
      };

      function riskLabel(st) {
        return st >= THRESHOLDS.doom ? "DOOM"
          : st >= THRESHOLDS.moderate ? "BORDERLINE"
            : "CASUAL";
      }
      function riskText(st) {
        return st >= THRESHOLDS.doom ? "CRITICAL RISK"
          : st >= THRESHOLDS.moderate ? "MODERATE RISK"
            : "LOW RISK";
      }
      function focusText(st) {
        return st >= THRESHOLDS.doom ? "LOW FOCUS"
          : st >= THRESHOLDS.moderate ? "MODERATE FOCUS"
            : "HIGH FOCUS";
      }
      function riskColor(st) {
        return st >= THRESHOLDS.doom ? D.doom
          : st >= THRESHOLDS.moderate ? D.warn
            : D.safe;
      }

      /* ── Inline SVG icons ── */
      var ICONS = {
        Eye: "M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8 M12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6",
        Zap: "M13 2L3 14h9l-1 8 10-12h-9l1-8z",
        Brain: "M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-2.5 2.5",
        Activity: "M22 12h-4l-3 9L9 3l-3 9H2",
        AlertTriangle: "M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0 M12 9v4 M12 17h.01",
        ChevronRight: "M9 18l6-6-6-6", ChevronUp: "M18 15l-6-6-6 6", ChevronDown: "M6 9l6 6 6-6",
        Radio: "M12 1a3 3 0 1 0 0 6 3 3 0 0 0 0-6 M6.3 4.3a9 9 0 0 0 0 15.4 M17.7 4.3a9 9 0 0 1 0 15.4",
        Download: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4 M7 10l5 5 5-5 M12 15V3",
        Trash2: "M3 6h18 M8 6V4h8v2 M19 6l-1 14H6L5 6",
        Settings: "M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6 M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z",
        ArrowLeft: "M19 12H5 M12 19l-7-7 7-7",
        TrendingDown: "M23 18l-9.5-9.5-5 5L1 6 M17 18h6v-6",
        Lock: "M19 11H5a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2 M17 11V7a5 5 0 0 0-10 0v4",
        Cpu: "M9 3H5a2 2 0 0 0-2 2v4 M9 3h6 M9 3v18 M15 3h4a2 2 0 0 1 2 2v4 M15 3v18 M9 21h6 M15 21h4a2 2 0 0 0 2-2v-4",
        BarChart2: "M18 20V10 M12 20V4 M6 20v-6",
        Moon: "M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z",
        Shield: "M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z",
        Wifi: "M5 12.55a11 11 0 0 1 14.08 0 M1.42 9a16 16 0 0 1 21.16 0 M8.53 16.11a6 6 0 0 1 6.95 0 M12 20h.01",
        Battery: "M23 7h-2v10h2V7z M1 7h16v10H1V7z",
        Bug: "M8 2l1.88 1.88M14.12 3.88L16 2M9 7.13v-1a3 3 0 1 1 6 0v1M12 20c-3.3 0-6-2.7-6-6v-3a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v3c0 3.3-2.7 6-6 6M12 20v-9M6.53 9C4.6 8.8 3 7.1 3 5M6 13H2M3 21c0-2.1 1.7-3.9 3.8-4M20.97 5c0 2.1-1.6 3.8-3.5 4M22 13h-4M17.2 17c2.1.1 3.8 1.9 3.8 4",
        Check: "M20 6L9 17l-5-5"
      };

      function Ico(p) {
        var d = ICONS[p.name] || "", sz = p.size || 16, col = p.color || "currentColor";
        var segs = d.replace(/ M /g, "M").split(/(?=\bM\b)/);
        return e("svg", {
          width: sz, height: sz, viewBox: "0 0 24 24", fill: "none", stroke: col,
          strokeWidth: p.sw || 2, strokeLinecap: "round", strokeLinejoin: "round",
          style: Object.assign({ display: "inline-block", verticalAlign: "middle", flexShrink: 0 }, p.style || {})
        },
          segs.map(function (s, i) { return e("path", { key: i, d: s }); }));
      }

      function Label(p) {
        return e("span", { className: "mono", style: Object.assign({ fontSize: 10, letterSpacing: "0.18em", color: D.muted, textTransform: "uppercase" }, p.style || {}) }, p.children);
      }

      function Tag(p) {
        var c = p.label === "DOOM" ? D.doomMag : p.label === "BORDERLINE" ? D.warn : D.safe;
        return e("span", { className: "mono", style: { fontSize: 10, padding: "3px 10px", borderRadius: 4, color: c, background: c + "22", border: "1px solid " + c + "55", letterSpacing: "0.12em", fontWeight: 700 } }, p.label);
      }

      function Divider() { return e("div", { style: { height: 1, background: D.border, margin: "0 -1px" } }); }

      /* ── Redesigned Chart Helpers & Components ── */
      function rollingAvg(data, window) {
        return data.map(function (_, i) {
          var start = Math.max(0, i - (window || 20));
          var slice = data.slice(start, i + 1);
          return slice.reduce(function (a, b) { return a + b; }, 0) / slice.length;
        });
      }

      function lerpColor(a, b, t) {
        var ah = a.replace("#", ""), bh = b.replace("#", "");
        var ar = parseInt(ah.slice(0, 2), 16), ag = parseInt(ah.slice(2, 4), 16), ab = parseInt(ah.slice(4, 6), 16);
        var br = parseInt(bh.slice(0, 2), 16), bg = parseInt(bh.slice(2, 4), 16), bb = parseInt(bh.slice(4, 6), 16);
        var r = Math.round(ar + (br - ar) * t);
        var g = Math.round(ag + (bg - ag) * t);
        var b = Math.round(ab + (bb - ab) * t);
        return "rgb(" + r + "," + g + "," + b + ")";
      }

      function riskColorGradient(v) {
        if (v < MODEL_THRESHOLDS.moderateLabel) return lerpColor(D.safe, D.safe, 0);
        if (v < MODEL_THRESHOLDS.circadianHigh) return lerpColor(D.safe, D.warn, (v - MODEL_THRESHOLDS.moderateLabel) / 0.3);
        return lerpColor(D.warn, D.doomMag, (v - MODEL_THRESHOLDS.circadianHigh) / 0.35);
      }

      /* ── Advanced color scoring ── */
      function advRiskColor(v, alpha) {
        if (alpha === undefined) alpha = 1;
        var r, g, b;
        if (v <= 0.35) {
          var t = v / 0.35;
          r = Math.round(13 + (255 - 13) * t * 0.7); g = Math.round(223 - (223 - 179) * t); b = Math.round(242 - (242 - 64) * t);
        } else if (v <= 0.65) {
          var t = (v - 0.35) / 0.30;
          r = Math.round(13 + (242 - 13) * t); g = Math.round(223 - 223 * t); b = Math.round(242 - 242 * t);
        } else {
          var t = (v - 0.65) / 0.35;
          r = 242; g = 0; b = Math.round(166 * t);
        }
        return "rgba(" + r + "," + g + "," + b + "," + alpha + ")";
      }
      function advRiskColorHex(v) {
        if (v <= 0.35) return "#0ddff2";
        if (v <= 0.65) {
          var t = (v - 0.35) / 0.30;
          var r = Math.round(13 + (242 - 13) * t).toString(16).padStart(2, "0");
          var g = Math.round(223 - 223 * t).toString(16).padStart(2, "0");
          return "#" + r + g + "00";
        }
        var t = (v - 0.65) / 0.35;
        var b = Math.round(166 * t).toString(16).padStart(2, "0");
        return "#f200" + b;
      }
      function getAlphaColor(rgba, a) { return rgba.replace(/[\d\.]+\)$/g, a + ")"); }

      function solveSmooth(data, window) {
        if (window <= 1) return data;
        var out = [];
        for (var i = 0; i < data.length; i++) {
          var sum = 0, count = 0;
          for (var j = Math.max(0, i - window); j <= Math.min(data.length - 1, i + window); j++) {
            sum += data[j];
            count++;
          }
          out.push(sum / count);
        }
        return out;
      }

      function RiskBar(p) {
        var v = p.v;
        return e("div", { style: { height: 3, borderRadius: 2, background: "rgba(255,255,255,0.05)", position: "relative", flex: 1 } },
          e("div", { style: { position: "absolute", left: 0, top: 0, bottom: 0, width: (v * 100) + "%", background: advRiskColorHex(v), borderRadius: 2, boxShadow: "0 0 8px " + advRiskColor(v, 0.4) } })
        );
      }

      function HeatDens(p) {
        var data = p.data, height = p.height || 4;
        var canvasRef = React.useRef(null);
        React.useEffect(function () {
          var c = canvasRef.current;
          if (!c) return;
          var ctx = c.getContext("2d");
          c.width = data.length; c.height = height;
          data.forEach(function (v, i) {
            ctx.fillStyle = advRiskColor(v, 0.8);
            ctx.fillRect(i, 0, 1, height);
          });
        }, [data]);
        return e("canvas", { ref: canvasRef, style: { width: "100%", height: height, display: "block", borderRadius: 2, imageRendering: "pixelated" } });
      }

      function SessionTopologyCanvas(p) {
        var data = p.data || [], height = p.height || 160;
        var cursor = p.cursor, setCursor = p.setCursor;
        var sessionBoundaries = p.sessionBoundaries || [];
        var canvasRef = React.useRef(null);
        var [smoothWin, setSmoothWin] = React.useState(5);

        var raw = (data.length > 0 ? data : [{ p: 0 }]).map(function (d) {
          var v = (d && typeof d.p === "number") ? d.p : 0;
          return Math.max(0, Math.min(1, v));
        });
        var smoothed = solveSmooth(raw, smoothWin);
        var reelCount = raw.length;
        var safeCursor = Math.max(0, Math.min(cursor || 0, Math.max(0, reelCount - 1)));
        var topologyMode = sessionBoundaries.length > 0 ? "Cross-Session Reel Dynamics" : "Per-Reel Capture Dynamics";

        React.useEffect(function () {
          if (safeCursor !== (cursor || 0) && setCursor) setCursor(safeCursor);
        }, [safeCursor, cursor, setCursor]);

        var momentum = "Stable";
        if (smoothed.length >= 5) {
          var recent = smoothed.slice(-5);
          var slope = (recent[4] - recent[0]) / 4;
          if (slope > 0.02) momentum = "Rising";
          else if (slope < -0.02) momentum = "Falling";
        }

        React.useEffect(function () {
          var c = canvasRef.current; if (!c) return;
          var ctx = c.getContext("2d");

          model_confidence: rawData.model_confidence || 0,
          doom_label: neuralLoad >= THRESHOLDS.doom ? "DOOM" : neuralLoad > THRESHOLDS.moderate ? "BORDERLINE" : "CASUAL",
          // Pull Index = trap rate / escape rate (session-level):
          // how much faster you are pulled in than you break out.
          doom_pull_index: (
            Math.max(0.001, (sessA && sessA[0] ? sessA[0][1] : A[0][1])) /
            Math.max(0.001, (sessA && sessA[1] ? sessA[1][0] : A[1][0]))
          ).toFixed(1),
          sessions_today: sessionsToday.length,
          // Doom Rate uses robust sessions (>=5 reels) and final session state label.
          doom_dominance: qualifyingSessions.length > 0
            ? Math.round(qualifyingSessions.filter(function (s) { return s.dominantState === 1; }).length / qualifyingSessions.length * 100) + "%"
            : "0%",
          total_interactions_today: sessionsToday.reduce(function (a, b) { return a + (b.totalInteractions || 0); }, 0),
          active_time_today: activeTimeTodayStr,
          doom_components: finalDoomComponents
        });

        var live = {
          duration: l10_m > 0 ? l10_m + "m " + l10_s + "s" : l10_s + "s",
          reels: Math.round(l10_avgNReels),
          avg_dwell: l10_avgDwellAvg.toFixed(1)
        };

        var reelsData = perReelCapture.length > 0
          ? perReelCapture.map(function (p, i) { return { r: "Reel " + (i + 1), p: p, exit: false, back: false }; })
          : rawData.sessions.map(function (s, i) { return { r: "Session " + (i + 1), p: s.S_t, exit: s.dominantState === 1 && i === rawData.sessions.length - 1, back: false }; });

        var days14 = (function () {
          var names = ["S", "M", "T", "W", "T", "F", "S"];
          /* Group sessions by date, average S_t per day */
          var byDate = {};
          rawData.sessions.forEach(function (s) {
            var dk = s.date || "unknown";
            if (!byDate[dk]) byDate[dk] = [];
            byDate[dk].push(s.S_t);
          });
          /* Build 14 calendar-day slots ending today */
          var now = new Date();
          var result = [];
          for (var i = 13; i >= 0; i--) {
            var d = new Date(now);
            d.setDate(d.getDate() - i);
            var mm = String(d.getMonth() + 1).padStart(2, "0");
            var dd = String(d.getDate()).padStart(2, "0");
            var dateKey = mm + "-" + dd;
            var dayIdx = d.getDay();
            var vals = byDate[dateKey];
            var avg = vals ? vals.reduce(function (a, b) { return a + b; }, 0) / vals.length : 0;
            result.push({ d: names[dayIdx], v: parseFloat(avg.toFixed(2)), hasData: !!(vals && vals.length) });
          }
          return result;
        })();

        var tabs = [{ id: "home", icon: "Eye", label: "Monitor" }, { id: "dashboard", icon: "BarChart2", label: "Dashboard" }, { id: "settings", icon: "Settings", label: "Settings" }];

        return e("div", { style: { display: "flex", justifyContent: "center", minHeight: "100vh", background: "#000", alignItems: "flex-start" } },
          e("div", { className: "app-shell", style: { position: "relative" } },
            e("div", { className: "scanlines" }),
            e("div", { className: "scan" }),
            /* Top nav */
            e("div", { style: { height: 44, display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 20px", position: "sticky", top: 0, zIndex: 100, background: "rgba(5,5,10,0.92)", backdropFilter: "blur(20px)", borderBottom: "1px solid " + D.border } },
              screen === "dashboard"
                ? e("button", { onClick: function () { setScreen("home"); }, style: { background: "none", border: "none", cursor: "pointer", display: "flex", alignItems: "center", gap: 4, color: D.safe, fontFamily: "inherit", fontSize: 13, fontWeight: 600 } },
                  e(Ico, { name: "ArrowLeft", size: 16, color: D.safe }), " Home")
                : e("div", { className: "mono", style: { fontSize: 11, color: D.muted } }, "v3.0"),
              e("div", { className: "mono", style: { fontSize: 11, color: D.muted } }, "SYNCED")
            ),
            /* Content */
            e("div", {
              style: { overflowY: "auto", height: "calc(100vh - 44px - 56px)" },
              onTouchStart: onContentTouchStart,
              onTouchEnd: onContentTouchEnd
            },
              screen === "home"
                ? e(HomeScreen, {
                  onNav: setScreen,
                  session: session,
                  live: live,
                  isServiceActive: svcActive,
                  totalReelsAll: totalReelsAll,
                  onEnableAccessibility: beginAccessibilityEnableFlow
                })
                : screen === "dashboard"
                  ? e(DashboardScreen, { session: session, reelsData: reelsData, sessionBoundaries: sessionBoundaries, days14: days14, circadian: rawData.circadian || [], totalReelsAll: totalReelsAll, avgNReels: avgNReels, featureWeights: rawData.feature_weights, scorerComponentWeights: rawData.scorer_component_weights || null })
                  : e(SettingsScreen, { onNav: setScreen })
            ),
            /* Tab bar */
            e("div", { className: "tab-bar" },
              tabs.map(function (tab) {
                return e("button", { key: tab.id, className: "tab-item ripple-surface" + (screen === tab.id ? " active" : ""), onClick: function () { setScreen(tab.id); } },
                  e(Ico, { name: tab.icon, size: 20, color: screen === tab.id ? D.safe : D.muted }),
                  e("span", null, tab.label)
                );
              })
            )
          )
        );
      }

      /* ── Android bridge ── */
      window.injectDataB64 = function (b64) {
        try { var parsed = JSON.parse(atob(b64)); }
        catch (ex) { parsed = { error: "Parse error: " + ex.message }; }
        window.injectedJsonData = parsed;
        if (window.reactDataCallback) window.reactDataCallback(parsed);
      };
      window.injectData = function (jsonStr) {
        try { var parsed = JSON.parse(jsonStr); }
        catch (ex) { parsed = { error: "JSON parse error: " + ex.message }; }
        window.injectedJsonData = parsed;
        if (window.reactDataCallback) window.reactDataCallback(parsed);
      };

      var root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(e(AppErrorBoundary, null, e(ReeliApp, null)));
    })();
  </script>
</body>

</html>
