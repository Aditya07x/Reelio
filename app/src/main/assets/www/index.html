<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Reelio</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #05050A;
      overflow-x: hidden
    }

    #root {
      width: 100%;
      min-height: 100vh
    }

    body {
      font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif
    }

    .mono {
      font-family: 'Share Tech Mono', 'Courier New', monospace
    }

    .spacemono {
      font-family: 'Space Mono', monospace
    }

    .app-shell {
      width: 100%;
      min-height: 100vh;
      background: #05050A;
      color: #D0DCF0;
      position: relative;
      overflow: hidden;
      max-width: 500px;
      margin: 0 auto;
    }

    /* Cyber grid */
    .app-shell::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(to right, rgba(13, 223, 242, 0.04) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(13, 223, 242, 0.04) 1px, transparent 1px);
      background-size: 20px 20px;
      pointer-events: none;
      z-index: 0;
    }

    /* Top bloom */
    .app-shell::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 180px;
      background: linear-gradient(to bottom, rgba(13, 223, 242, 0.06), transparent);
      pointer-events: none;
      z-index: 0;
    }

    /* Scanlines */
    .scanlines {
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0) 50%, rgba(0, 0, 0, 0.07) 50%);
      background-size: 100% 4px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.35;
    }

    @keyframes pulse-dot {

      0%,
      100% {
        opacity: 1;
        transform: scale(1)
      }

      50% {
        opacity: .4;
        transform: scale(.8)
      }
    }

    @keyframes ring-out {
      0% {
        transform: scale(1);
        opacity: .7
      }

      100% {
        transform: scale(1.8);
        opacity: 0
      }
    }

    @keyframes slide-up {
      from {
        opacity: 0;
        transform: translateY(16px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes scan-line {
      0% {
        top: -2px
      }

      100% {
        top: 100%
      }
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-3px)
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    @keyframes ping-slow {

      0%,
      100% {
        transform: scale(1);
        opacity: .75
      }

      50% {
        transform: scale(1.6);
        opacity: 0
      }
    }

    .pulse {
      animation: pulse-dot 2s ease-in-out infinite
    }

    .slide-up {
      animation: slide-up .5s ease both
    }

    .float {
      animation: float 3s ease-in-out infinite
    }

    .ping {
      animation: ping-slow 2s ease-in-out infinite
    }

    .scan {
      position: absolute;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(13, 223, 242, 0.5), transparent);
      animation: scan-line 5s linear infinite;
      pointer-events: none;
    }

    /* Base card */
    .card {
      background: rgba(10, 17, 20, 0.85);
      border: 1px solid rgba(13, 223, 242, 0.12);
      border-radius: 16px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      position: relative;
      overflow: hidden;
    }

    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(13, 223, 242, 0.03) 0%, transparent 60%);
      pointer-events: none;
      border-radius: inherit;
    }

    /* Magenta doom card */
    .card-doom {
      background: rgba(26, 11, 21, 0.85);
      border-color: rgba(242, 13, 166, 0.35);
    }

    .card-doom::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #f20da6, transparent);
      opacity: .7;
    }

    /* Red danger card */
    .card-danger {
      border-color: rgba(255, 45, 85, 0.35)
    }

    .card-danger::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #FF2D55, transparent);
      opacity: .5;
    }

    ::-webkit-scrollbar {
      width: 3px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: #3D4F6B;
      border-radius: 2px
    }

    .btn-primary {
      width: 100%;
      padding: 18px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: .03em;
      background: linear-gradient(135deg, #0ddff2, #00B8A4);
      color: #020A0A;
      position: relative;
      overflow: hidden;
      transition: transform .15s ease;
      box-shadow: 0 8px 32px rgba(13, 223, 242, 0.25);
    }

    .btn-primary:active {
      transform: scale(.98)
    }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 3px;
      border-radius: 2px;
      background: rgba(13, 223, 242, 0.2);
      outline: none;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #0ddff2;
      box-shadow: 0 0 10px #0ddff2;
      cursor: pointer;
    }

    .tab-bar {
      position: sticky;
      bottom: 0;
      background: rgba(5, 5, 10, 0.97);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(13, 223, 242, 0.1);
      display: flex;
    }

    .tab-item {
      flex: 1;
      padding: 12px 8px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
      border: none;
      background: transparent;
      color: #3D4F6B;
      font-family: 'Space Grotesk';
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .05em;
      transition: color .2s;
    }

    .tab-item.active {
      color: #0ddff2
    }

    .tab-item.active svg {
      filter: drop-shadow(0 0 6px #0ddff2)
    }

    /* Driver progress bar */
    .driver-bar {
      height: 5px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 3px;
      overflow: hidden;
    }

    .driver-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 1s ease
    }
  </style>
</head>

<body>

    <div

              )
            ),
            e("div", { style: { height: 120, overflow: "hidden" } },
              e(AreaChartSVG, { data: RD, cursor: rc, height: 110 })
            ),
            e("div", { style: { marginTop: 8 } },
              e("input", { type: "range", min: 0, max: Math.max(0, RD.length - 1), value: rc, onChange: function (ev) { setRc(+ev.target.value); } }),
              e("div", { style: { display: "flex", justifyContent: "space-between", marginTop: 2 } },

          /* ── Doom Score Anatomy (Interactive) ── */
          e("div", { className: "card", style: { marginBottom: 10, overflow: "hidden" } },
            e("div", { style: { padding: "16px" } },
              e("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 } },
                e(Label, null, "Top Doom Drivers · Doom Score Anatomy")
              ),
              e("div", { style: { fontSize: 11, color: D.muted, marginBottom: 16, fontFamily: "'JetBrains Mono', monospace", lineHeight: 1.6 } },
                "7 named components · tap each to expand inference"
              ),
              [
                { k: "length", l: "Session Length", icon: "BarChart2", desc: "Your session exceeded the 420-reel baseline. This is the strongest indicator of compromised volition." },
                { k: "volitional_conflict", l: "Exit Conflict", icon: "Lock", desc: "You repeatedly closed and re-opened the app within a 20s window, indicating internal conflict." },
                { k: "rapid_reentry", l: "Rapid Re-entry", icon: "Zap", desc: "Short intervals between sessions. The model interprets this as a failure to transition to a resting state." },
                { k: "automaticity", l: "Scroll Automaticity", icon: "Activity", desc: "Extremely low variance in your swipe cadence. The rhythm has become robotic and stimulus-bound." },
                { k: "dwell_collapse", l: "Dwell Collapse", icon: "TrendingDown", desc: "Your average dwell time per reel dropped significantly compared to the start of the session." },
                { k: "rewatch", l: "Rewatch Compulsion", icon: "Radio", desc: "High number of back-scrolls to re-consume content you already viewed. A key marker of capture." },
                { k: "environment", l: "Environment", icon: "Moon", desc: "Late night usage heavily penalizes your score due to the circadian disruption risk." }
              ].map(function (it) {
                var v = S.doom_components[it.k] || 0.5;
                var col = v > 0.7 ? D.doomMag : v > 0.45 ? D.warn : D.safe;
                var isExpanded = exp === "anatomy_" + it.k;
                return e("div", {
                  key: it.k,
                  onClick: function () { tog(isExpanded ? null : "anatomy_" + it.k); },
                  style: { marginBottom: 14, cursor: "pointer" }
                },
                  e("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 } },
                    e("div", { style: { display: "flex", alignItems: "center", gap: 8 } },
                      e("div", { style: { width: 28, height: 28, borderRadius: 8, background: col + "18", border: "1px solid " + col + "33", display: "flex", alignItems: "center", justifyContent: "center" } },
                        e(Ico, { name: it.icon, size: 13, color: col })
                      ),
                      e("div", null,
                        e("div", { style: { fontSize: 13, fontWeight: 600, color: D.text } }, it.l),
                        e("div", { className: "mono", style: { fontSize: 9, color: D.muted } }, "weight: " + (v * 100).toFixed(0) + "%")
                      )
                    ),
                    e("span", { className: "mono", style: { fontSize: 16, fontWeight: 700, color: col, textShadow: "0 0 10px " + col + "66" } }, Math.round(v * 100) + "%")
                  ),
                  e("div", { style: { height: 4, background: "rgba(255,255,255,0.05)", borderRadius: 4, overflow: "hidden" } },
                    e("div", { style: { height: "100%", width: (v * 100) + "%", background: "linear-gradient(90deg," + col + "88," + col + ")", borderRadius: 4, boxShadow: "0 0 8px " + col + "55", transition: "width 1.2s cubic-bezier(0.4,0,0.2,1)" } })
                  ),
                  isExpanded && e("div", { style: { marginTop: 8, padding: "8px 12px", background: col + "08", border: "1px solid " + col + "22", borderRadius: 8, fontSize: 11, color: "rgba(248,250,252,0.6)", lineHeight: 1.7 } },
                    it.desc
                  )
                );
              }),
              e("div", { style: { marginTop: 6, padding: "10px 14px", background: "rgba(236,72,153,0.04)", borderRadius: 10, borderLeft: "2px solid rgba(236,72,153,0.3)", fontSize: 11, color: "rgba(248,250,252,0.55)", lineHeight: 1.7 } },
                "💡 ", e("strong", { style: { color: "rgba(236,72,153,0.7)" } }, "What this means: "), "Session Length is the single biggest lever — cutting your session to your 420-reel baseline alone would reduce your Doom Score by ~13 points. Tap any driver to see the exact behavioral signal behind the score."
              )
            )
          ),

          /* ── Circadian Doom Profile (24h Pattern) ── */
          e("div", { className: "card", style: { padding: "16px", marginBottom: 10 } },
            e("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 } },
              e(Label, null, "Circadian Doom Profile · 24h Pattern")
            ),
            e("div", { style: { fontSize: 11, color: D.muted, marginBottom: 16, fontFamily: "'JetBrains Mono', monospace", lineHeight: 1.6 } },
              "Average doom probability by hour of day · personalized baseline"
            ),
            e("div", { style: { height: 160, overflow: "visible", marginTop: 10 } },
              e(CircadianAreaChartSVG, {
                data: window.CIRCADIAN || [
                  { h: '00', doom: 0.72 }, { h: '02', doom: 0.81 }, { h: '04', doom: 0.62 },
                  { h: '06', doom: 0.21 }, { h: '08', doom: 0.18 }, { h: '10', doom: 0.24 },
                  { h: '12', doom: 0.38 }, { h: '14', doom: 0.44 }, { h: '16', doom: 0.35 },
                  { h: '18', doom: 0.58 }, { h: '20', doom: 0.76 }, { h: '22', doom: 0.89 }
                ], height: 140
              })
            ),

            e("div", { style: { display: "flex", gap: 8, marginTop: 12, flexWrap: "wrap", marginBottom: 14 } },
              e("div", { className: "card", style: { padding: "6px 10px", background: "rgba(236,72,153,0.08)", borderColor: "rgba(236,72,153,0.2)", color: "rgba(236,72,153,0.8)", fontSize: 10, fontFamily: "'JetBrains Mono', monospace" } }, "Peak: 22:00–23:59"),
              e("div", { className: "card", style: { padding: "6px 10px", background: "rgba(34,211,238,0.08)", borderColor: "rgba(34,211,238,0.2)", color: "rgba(34,211,238,0.8)", fontSize: 10, fontFamily: "'JetBrains Mono', monospace" } }, "Safest: 06:00–11:00"),
              e("div", { className: "card", style: { padding: "6px 10px", background: "rgba(251,191,36,0.08)", borderColor: "rgba(251,191,36,0.2)", color: "rgba(251,191,36,0.8)", fontSize: 10, fontFamily: "'JetBrains Mono', monospace" } }, "Evening escalation")
            ),
            e("div", { style: { padding: "10px 14px", background: "rgba(34,211,238,0.04)", borderRadius: 10, borderLeft: "2px solid rgba(34,211,238,0.3)", fontSize: 11, color: "rgba(248,250,252,0.55)", lineHeight: 1.7 } },
              "💡 ", e("strong", { style: { color: "rgba(34,211,238,0.8)" } }, "What this means: "), "Late-night use (10 PM+) nearly doubles your doom probability vs morning. The CTMC component accounts for this automatically — transitions that occur in high-doom circadian phases carry heavier weights. Setting a 10 PM soft block could reduce weekly doom capture by ~18%."
            )
          )
        );
      }

      /* ─────────────────────────────────────────────────────────────────
         SETUP / ERROR SCREEN
      ───────────────────────────────────────────────────────────────── */
      function SetupScreen(p) {
        return e("div", { style: { minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: D.bg, padding: 32, gap: 20 } },
          e("div", { style: { width: 64, height: 64, borderRadius: "50%", background: D.safe + "15", border: "1px solid " + D.safe + "44", display: "flex", alignItems: "center", justifyContent: "center" } },
            e(Ico, { name: "Shield", size: 28, color: D.safe })
          ),
          e("div", { style: { fontSize: 24, fontWeight: 800, color: "#fff", textAlign: "center" } }, "Reelio"),
          e("div", { className: "mono", style: { fontSize: 10, color: D.safe, letterSpacing: "0.3em", textAlign: "center" } }, "SETUP REQUIRED"),
          e("div", { className: "card", style: { width: "100%", padding: 20 } },
            e("div", { style: { fontSize: 14, fontWeight: 700, color: D.text, marginBottom: 12 } }, "Getting Started"),
            ["1. Settings → Accessibility → Installed Services", "2. Enable \"Reelio Tracker\"", "3. Open Instagram and scroll Reels", "4. Return here to see your data"].map(function (s, i) {
              return e("div", { key: i, style: { display: "flex", gap: 10, marginBottom: 10 } },
                e("div", { className: "mono", style: { fontSize: 11, color: D.safe, flexShrink: 0 } }, s.slice(0, 2)),
                e("div", { style: { fontSize: 13, color: D.muted } }, s.slice(3))
              );
            })
          ),
          e("button", { className: "btn-primary", onClick: function () { window.Android && window.Android.enableAccessibility && window.Android.enableAccessibility(); } }, "Enable Accessibility Service"),
          p.message && e("div", { style: { fontSize: 12, color: D.muted, textAlign: "center", lineHeight: 1.6, marginTop: 4 } }, p.message)
        );
      }

      /* ─────────────────────────────────────────────────────────────────
         ROOT APP
      ───────────────────────────────────────────────────────────────── */
      function ReeliApp() {
        var ss = useState("home"), screen = ss[0], setScreen = ss[1];
        var ds = useState(null), rawData = ds[0], setRawData = ds[1];
        var ls = useState(true), loading = ls[0], setLoading = ls[1];
        var es = useState(null), errMsg = es[0], setErrMsg = es[1];
        var vs = useState(false), svcActive = vs[0], setSvcActive = vs[1];

        useEffect(function () {
          if (window.Android && window.Android.isAccessibilityEnabled) {
            try { setSvcActive(window.Android.isAccessibilityEnabled()); } catch (x) { }
          }
          window.updateServiceStatus = function (v) { setSvcActive(v); };

          function handleData(parsed) {
            try {
              if (parsed.error) { setErrMsg(parsed.error); }
              else if (parsed.sessions && parsed.sessions.length > 0) {
                if (parsed.circadian) window.CIRCADIAN = parsed.circadian;
                setRawData(parsed);
                setErrMsg(null);
              }
              else { setErrMsg("No data yet. Scroll some Reels first!"); }
            } catch (x) { setErrMsg("Parse error: " + x.message); }
            setLoading(false);
          }
          window.reactDataCallback = handleData;
          if (window.injectedJsonData) { handleData(window.injectedJsonData); return; }
          var t = setTimeout(function () { setLoading(false); }, 3000);
          return function () { clearTimeout(t); };
        }, []);

        if (loading) {
          return e("div", { style: { minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: D.bg, gap: 16 } },
            e("div", { style: { width: 40, height: 40, border: "3px solid rgba(13,223,242,0.15)", borderTopColor: D.safe, borderRadius: "50%", animation: "spin .8s linear infinite" } }),
            e("div", { className: "mono", style: { color: D.muted, fontSize: 11, letterSpacing: "0.2em" } }, "REELIO")
          );
        }

        if (!rawData) { return e(SetupScreen, { message: errMsg }); }

        /* ── Derive session data ── */
        var mr = rawData.sessions[rawData.sessions.length - 1];
        var allSt = rawData.sessions.map(function (s) { return s.S_t; });
        var avgSt = allSt.reduce(function (a, b) { return a + b; }, 0) / rawData.sessions.length;
        var A = (rawData.model_parameters && rawData.model_parameters.transition_matrix) || [[0.8, 0.2], [0.2, 0.8]];

        var totalDwellSec = rawData.sessions.reduce(function (sum, s) { return sum + (s.avgDwell || s.meanDwell || s.avg_dwell || 0) * (s.nReels || 0); }, 0);
        var totalDwellMin = totalDwellSec > 60 ? (totalDwellSec / 60).toFixed(1) + "m" : Math.round(totalDwellSec) + "s";
        var overallAvgDwell = (rawData.sessions.reduce(function (sum, s) { return sum + (s.avgDwell || s.meanDwell || s.avg_dwell || 0); }, 0) / Math.max(rawData.sessions.length, 1)).toFixed(1);
        var perReelCapture = (rawData.timeline && rawData.timeline.p_capture) || [];
        var sessionReelsSum = rawData.sessions.reduce(function (sum, s) { return sum + (s.nReels || 0); }, 0);
        var totalReelsAll = sessionReelsSum > 0 ? sessionReelsSum : perReelCapture.length;
        var escapeRate = Math.max(0.01, A[1][0]);
        var avgNReels = totalReelsAll / Math.max(rawData.sessions.length, 1);
        var pLostTrack = rawData.sessions.filter(function (s) { return s.dominantState === 1; }).length / Math.max(rawData.sessions.length, 1);

        var doomComponents = {
          length: Math.min(1, avgNReels / 80),
          volitional_conflict: pLostTrack,
          rapid_reentry: Math.min(1, A[0][1] * 3),
          automaticity: Math.min(1, A[1][1]),
          dwell_collapse: Math.min(1, Math.max(0, 1 - (parseFloat(overallAvgDwell) / 15))),
          rewatch: Math.min(1, mr.S_t),
          environment: mr.timePeriod === "Late Night" || mr.timePeriod === "Night" ? 0.8 : mr.timePeriod === "Evening" ? 0.55 : 0.3
        };

        var timePeriodAvgCapture = (function () {
          if (!mr.timePeriod) return mr.S_t;
          var tpSess = rawData.sessions.filter(function (s) { return s.timePeriod === mr.timePeriod; });
          if (!tpSess.length) return mr.S_t;
          return tpSess.reduce(function (a, b) { return a + b.S_t; }, 0) / tpSess.length;
        })();

        var SESSION = Object.assign({}, mr, {
          doom_label: mr.S_t > 0.6 ? "DOOM" : mr.S_t > 0.35 ? "BORDERLINE" : "CASUAL",
          doom_score: mr.S_t,
          model_confidence: rawData.model_confidence != null ? rawData.model_confidence : Math.min(0.95, rawData.sessions.length / 20),
          doom_pull_index_num: ((A[0][1] / Math.max(0.01, A[1][0])) * 1.5),
          doom_pull_index: ((A[0][1] / Math.max(0.01, A[1][0])) * 1.5).toFixed(1),
          regime_stability: 1.0 / (escapeRate + 0.001),
          sessions_today: rawData.sessions.length,
          total_dwell_today_min: totalDwellMin,
          capture_rate: pLostTrack,
          time_period_avg_capture: timePeriodAvgCapture,
          neural_load: Math.max(0, 1 - Math.abs(mr.S_t - 0.5) * 2),
          intervention_score: Math.min(1.0, (mr.S_t > 0.5 ? 0.5 : 0) + pLostTrack),
          total_doom_reels: sessionReelsSum > 0 ? Math.round(rawData.sessions.reduce(function (acc, s) { return acc + (s.nReels || 0) * s.S_t; }, 0)) : 0,
          A: A, h: [A[0][0], A[1][1]],
          doom_components: doomComponents
        });

        var currentSessionDwellSec = (mr.avgDwell || mr.meanDwell || mr.avg_dwell || 0) * (mr.nReels || 0);
        var currentSessionDuration = currentSessionDwellSec > 0 ? (currentSessionDwellSec > 60 ? (currentSessionDwellSec / 60).toFixed(1) + "m" : Math.round(currentSessionDwellSec) + "s") : "LIVE";
        var LIVE = { duration: currentSessionDuration, reels: totalReelsAll, avg_dwell: parseFloat(overallAvgDwell) || "--" };

        var REELS_DATA = perReelCapture.length > 0
          ? perReelCapture.map(function (p, i) { return { r: i + 1, p: p, exit: false, back: false }; })
          : rawData.sessions.map(function (s, i) { return { r: i + 1, p: s.S_t, exit: s.dominantState === 1 && i === rawData.sessions.length - 1, back: false }; });

        var DAYS_14 = (function () {
          var names = ["S", "M", "T", "W", "T", "F", "S"];
          var today = new Date().getDay();
          var base = rawData.sessions.slice(-14).map(function (s, i, arr) {
            var offset = arr.length - 1 - i;
            var dIdx = (today - offset) % 7;
            if (dIdx < 0) dIdx += 7;
            return { d: names[dIdx], v: parseFloat(s.S_t.toFixed(2)) };
          });
          while (base.length < 14) {
            var offset = base.length;
            var dIdx = (today - offset) % 7;
            if (dIdx < 0) dIdx += 7;
            base.unshift({ d: names[dIdx], v: parseFloat(avgSt.toFixed(2)) });
          }
          return base.slice(-14);
        })();

        var tabs = [{ id: "home", icon: "Eye", label: "Monitor" }, { id: "dashboard", icon: "BarChart2", label: "Dashboard" }, { id: "settings", icon: "Settings", label: "Settings" }];

        return e("div", { style: { display: "flex", justifyContent: "center", minHeight: "100vh", background: "#000", alignItems: "flex-start" } },
          e("div", { className: "app-shell", style: { position: "relative" } },
            e("div", { className: "scanlines" }),
            e("div", { className: "scan" }),
            /* Top nav */
            e("div", { style: { height: 44, display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 20px", position: "sticky", top: 0, zIndex: 100, background: "rgba(5,5,10,0.92)", backdropFilter: "blur(20px)", borderBottom: "1px solid " + D.border } },
              screen === "dashboard"
                ? e("button", { onClick: function () { setScreen("home"); }, style: { background: "none", border: "none", cursor: "pointer", display: "flex", alignItems: "center", gap: 4, color: D.safe, fontFamily: "inherit", fontSize: 13, fontWeight: 600 } },
                  e(Ico, { name: "ArrowLeft", size: 16, color: D.safe }), " Home")
                : e("div", { className: "mono", style: { fontSize: 11, color: D.muted } }, "v3.0"),
              e("div", { className: "mono", style: { fontSize: 11, color: D.muted } }, "SYNCED")
            ),
            /* Content */
            e("div", { style: { overflowY: "auto", maxHeight: "calc(100vh - 44px - 56px)" } },
              screen === "home"
                ? e(HomeScreen, { onNav: setScreen, SESSION: SESSION, LIVE: LIVE, isServiceActive: svcActive })
                : e(DashboardScreen, { SESSION: SESSION, REELS_DATA: REELS_DATA, DAYS_14: DAYS_14 })
            ),
            /* Tab bar */
            e("div", { className: "tab-bar" },
              tabs.map(function (tab) {
                return e("button", { key: tab.id, className: "tab-item" + (screen === tab.id ? " active" : ""), onClick: function () { setScreen(tab.id === "settings" ? "home" : tab.id); } },
                  e(Ico, { name: tab.icon, size: 20, color: screen === tab.id ? D.safe : D.muted }),
                  e("span", null, tab.label)
                );
              })
            )
          )
        );
      }

      /* ── Android bridge ── */
      window.injectDataB64 = function (b64) {
        try { var parsed = JSON.parse(atob(b64)); window.injectedJsonData = parsed; if (window.reactDataCallback) window.reactDataCallback(parsed); }
        catch (ex) { if (window.reactDataCallback) window.reactDataCallback({ error: "Parse error: " + ex.message }); }
      };
      window.injectData = function (jsonStr) {
        try { var parsed = JSON.parse(jsonStr); window.injectedJsonData = parsed; if (window.reactDataCallback) window.reactDataCallback(parsed); }
        catch (ex) { if (window.reactDataCallback) window.reactDataCallback({ error: "JSON parse error: " + ex.message }); }
      };

      var root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(e(ReeliApp, null));
    })();
  </script>
