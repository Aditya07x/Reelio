<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Behavioral Dynamics Dashboard</title>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background_primary: '#0B1220',
                        background_secondary: '#111827',
                        card_surface: '#1A2333',
                        card_elevated: '#1F2A3D',
                        cyan_accent: '#22D3EE',
                        success_accent: '#34D399',
                        warning_accent: '#FBBF24',
                        danger_accent: '#F87171',
                        text_primary: '#F3F4F6',
                        text_secondary: '#9CA3AF',
                        text_muted: '#6B7280',
                        border_subtle: 'rgba(255,255,255,0.06)'
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.js"></script>
    <script src="https://unpkg.com/recharts@2.12.0/umd/Recharts.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background-color: #0B1220;
            /* background_primary */
            color: #F3F4F6;
            /* text_primary */
        }

        .glass-card {
            background: #1A2333;
            /* card_surface */
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 16px 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(34, 211, 238, 0.08);
            /* slight cyan lift */
            border-color: rgba(34, 211, 238, 0.15);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: #1F2A3D;
            /* card_elevated */
            border-radius: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }
    </style>
</head>

<body class="antialiased min-h-screen font-sans bg-[#0B1220] text-[#F3F4F6]">
    <div id="root">
        <div
            style="display:flex; justify-content:center; align-items:center; height:100vh; color:#94A3B8; font-size:14px; text-transform:uppercase; letter-spacing:0.05em;">
            <div class="w-10 h-10 border-4 border-slate-700 border-t-cyan-400 rounded-full animate-spin"></div>
        </div>
    </div>

    <!-- PRE-BABEL JS BRIDGE BUFFER -->
    <script>
        window.injectedJsonData = null;
        window.reactDataCallback = null;
        window.injectData = function (jsonString) {
            console.log("JSON Data received from Android early inject!");
            try {
                const parsed = JSON.parse(jsonString);
                window.injectedJsonData = parsed;
                if (window.reactDataCallback) {
                    window.reactDataCallback(parsed);
                }
            } catch (e) {
                console.error("Failed to parse injected JSON payload: ", e);
            }
        };
    </script>
    <!-- LOAD V2 DASHBOARD -->
    <script type='text/babel'>
        const { useState, useEffect, useMemo } = React;
        const {
            AreaChart, Area,
            XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer
        } = window.Recharts;

        const COLORS = {
            cyan: '#22D3EE',
            amber: '#FBBF24',
            red: '#EF4444',
            green: '#10B981',
            slate_800: '#1E293B',
            slate_700: '#334155'
        };

        const CognitiveStabilityScore = ({ sessions, A11 }) => {
            const meanState = sessions.length > 0 ? sessions.reduce((acc, s) => acc + s.S_t, 0) / sessions.length : 0;
            const recoveryPower = 1.0 - A11;
            const score = Math.max(0, Math.min(100, Math.round((1.0 - meanState) * 80 + recoveryPower * 20)));

            let colorClass = "text-success_accent";
            if (score < 40) colorClass = "text-danger_accent";
            else if (score < 70) colorClass = "text-warning_accent";

            return (
                <div className="glass-card flex items-center justify-between border-b-4 border-b-card_elevated hover:border-b-cyan_accent">
                    <div>
                        <h2 className="text-[11px] font-medium text-text_muted uppercase tracking-[0.15em] mb-1">Index</h2>
                        <div className="text-[15px] font-semibold text-text_primary">Cognitive Stability</div>
                    </div>
                    <div className={`text-[40px] font-bold tracking-tighter ${colorClass}`}>{score}</div>
                </div>
            );
        };

        const TransitionMatrixVisualizer = ({ matrix }) => {
            if (!matrix || matrix.length < 2) return null;
            return (
                <div className="glass-card h-full flex flex-col justify-between">
                    <h2 className="text-[12px] font-semibold text-text_secondary uppercase tracking-widest mb-4">State Dynamics</h2>
                    <div className="grid grid-cols-2 gap-3 flex-1">
                        <div className="bg-background_secondary rounded-[12px] p-4 flex flex-col justify-center items-center relative overflow-hidden group transition-all duration-300 hover:scale-[1.02] hover:bg-card_elevated cursor-pointer">
                            <span className="text-[11px] text-text_muted uppercase tracking-wider mb-1">Casual → Casual</span>
                            <span className="text-2xl font-bold text-cyan_accent">{(matrix[0][0] * 100).toFixed(1)}%</span>
                        </div>
                        <div className="bg-background_secondary rounded-[12px] p-4 flex flex-col justify-center items-center relative overflow-hidden group transition-all duration-300 hover:scale-[1.02] hover:bg-card_elevated cursor-pointer">
                            <span className="text-[11px] text-text_muted uppercase tracking-wider mb-1">Casual → Capture</span>
                            <span className="text-2xl font-bold text-warning_accent">{(matrix[0][1] * 100).toFixed(1)}%</span>
                        </div>
                        <div className="bg-background_secondary rounded-[12px] p-4 flex flex-col justify-center items-center relative overflow-hidden group transition-all duration-300 hover:scale-[1.02] hover:bg-card_elevated cursor-pointer">
                            <span className="text-[11px] text-text_muted uppercase tracking-wider mb-1">Capture → Casual</span>
                            <span className="text-2xl font-bold text-success_accent">{(matrix[1][0] * 100).toFixed(1)}%</span>
                        </div>
                        <div className="bg-background_secondary rounded-[12px] p-4 flex flex-col justify-center items-center relative overflow-hidden group transition-all duration-300 hover:scale-[1.02] hover:bg-card_elevated border border-danger_accent/10 cursor-pointer">
                            <span className="text-[11px] text-danger_accent/70 uppercase tracking-wider mb-1">Capture → Capture</span>
                            <span className="text-2xl font-bold text-danger_accent">{(matrix[1][1] * 100).toFixed(1)}%</span>
                        </div>
                    </div>
                </div>
            );
        };

        const HeatmapCalendar = ({ sessions }) => {
            const dailyMap = {};
            sessions.forEach(s => {
                if (!dailyMap[s.date]) dailyMap[s.date] = { sum: 0, count: 0 };
                dailyMap[s.date].sum += s.S_t;
                dailyMap[s.date].count += 1;
            });

            const dates = Object.keys(dailyMap).sort().slice(-14);

            return (
                <div className="glass-card h-full">
                    <h2 className="text-[12px] font-semibold text-text_secondary uppercase tracking-widest mb-4">Risk Heatmap (14 Days)</h2>
                    <div className="flex flex-wrap gap-3">
                        {dates.length === 0 ? <p className="text-text_muted text-[13px]">No daily data available</p> : null}
                        {dates.map(date => {
                            const avgSt = dailyMap[date].sum / dailyMap[date].count;
                            let bg = "bg-background_secondary";
                            if (avgSt > 0.6) bg = "bg-danger_accent/80 shadow-[0_0_12px_rgba(248,113,113,0.4)]";
                            else if (avgSt > 0.4) bg = "bg-warning_accent/80";
                            else if (avgSt > 0.2) bg = "bg-cyan_accent/50";
                            else bg = "bg-cyan_accent/20";

                            return (
                                <div key={date} className="flex flex-col items-center group relative cursor-pointer">
                                    <div className={`w-8 h-8 rounded-md ${bg} border border-border_subtle transition-transform duration-300 transform group-hover:-translate-y-1`}></div>
                                    <span className="text-[10px] text-text_muted mt-1.5 font-mono">{date.slice(-5)}</span>
                                    <div className="absolute bottom-full mb-3 bg-card_elevated text-[11px] px-3 py-1.5 rounded-md opacity-0 group-hover:opacity-100 pointer-events-none z-10 whitespace-nowrap shadow-xl border border-border_subtle transition-opacity duration-200">
                                        {date}: S_t = {(avgSt).toFixed(2)}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const TimelinePlayback = ({ timeline }) => {
            const [scrubIndex, setScrubIndex] = useState(0);
            if (!timeline || !timeline.p_capture) return null;

            const maxIdx = timeline.p_capture.length - 1;
            const chartData = timeline.p_capture.map((p, i) => ({
                idx: i, p: p, RiskZone: 0.5
            })).slice(Math.max(0, scrubIndex - 20), Math.min(maxIdx + 1, scrubIndex + 20));

            const currentState = timeline.p_capture[scrubIndex] > 0.5 ? "Captured" : "Casual";
            const stateColor = timeline.p_capture[scrubIndex] > 0.5 ? "text-danger_accent" : "text-cyan_accent";

            return (
                <div className="glass-card flex flex-col w-full h-[400px]">
                    <div className="flex justify-between items-end mb-6">
                        <div>
                            <h2 className="text-[12px] font-semibold text-text_secondary uppercase tracking-widest">Behavior Timeline Playback</h2>
                            <p className="text-[11px] text-text_muted tracking-wide mt-1">Reel Explorer • Zoom Window Active</p>
                        </div>
                        <div className="text-right">
                            <div className="text-[11px] uppercase text-text_muted tracking-widest">Reel {scrubIndex} State</div>
                            <div className={`text-[22px] font-bold ${stateColor}`}>{currentState} <span className="text-[14px] text-text_secondary font-normal block leading-tight">({(timeline.p_capture[scrubIndex] * 100).toFixed(0)}%)</span></div>
                        </div>
                    </div>

                    <div className="flex-1 w-full min-h-0 relative">
                        <ResponsiveContainer width="100%" height="100%">
                            <AreaChart data={chartData} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                                <defs>
                                    <linearGradient id="colorCap" x1="0" y1="0" x2="0" y2="1">
                                        <stop offset="5%" stopColor={COLORS.cyan} stopOpacity={0.4} />
                                        <stop offset="95%" stopColor={COLORS.cyan} stopOpacity={0.0} />
                                    </linearGradient>
                                    <linearGradient id="colorThreat" x1="0" y1="0" x2="0" y2="1">
                                        <stop offset="5%" stopColor={COLORS.red} stopOpacity={0.15} />
                                        <stop offset="95%" stopColor={COLORS.red} stopOpacity={0} />
                                    </linearGradient>
                                </defs>
                                <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.05)" vertical={false} />
                                <XAxis dataKey="idx" stroke="#9CA3AF" tick={{ fontSize: 11, fill: '#6B7280' }} tickLine={false} axisLine={{ stroke: 'rgba(255,255,255,0.1)' }} />
                                <YAxis stroke="#9CA3AF" domain={[0, 1]} tick={{ fontSize: 11, fill: '#6B7280' }} tickLine={false} axisLine={false} />
                                <Area type="stepBefore" dataKey="RiskZone" stroke="none" fill="url(#colorThreat)" activeDot={false} />
                                <Area type="monotone" dataKey="p" stroke={COLORS.cyan} strokeWidth={3} fill="url(#colorCap)" represents="Capture Prob" activeDot={{ r: 6, fill: '#0B1220', stroke: '#22D3EE', strokeWidth: 2 }} />
                            </AreaChart>
                        </ResponsiveContainer>
                    </div>

                    <div className="mt-6 flex items-center gap-4">
                        <span className="text-[11px] text-text_muted font-mono">0</span>
                        <input type="range" min="0" max={maxIdx} value={scrubIndex} onChange={(e) => setScrubIndex(parseInt(e.target.value))}
                            className="flex-1 h-1.5 bg-card_elevated rounded-lg appearance-none cursor-pointer accent-cyan_accent" />
                        <span className="text-[11px] text-text_muted font-mono">{maxIdx}</span>
                    </div>
                </div>
            );
        };

        const TriggerInsights = ({ sessions, A11 }) => {
            if (!sessions || sessions.length === 0) return null;

            const periodRisk = {};
            sessions.forEach(s => {
                if (!periodRisk[s.timePeriod]) periodRisk[s.timePeriod] = { sum: 0, c: 0 };
                periodRisk[s.timePeriod].sum += s.S_t;
                periodRisk[s.timePeriod].c += 1;
            });

            let worstPeriod = "Unknown", worstRisk = 0;
            Object.keys(periodRisk).forEach(k => {
                let avg = periodRisk[k].sum / periodRisk[k].c;
                if (avg > worstRisk) { worstRisk = avg; worstPeriod = k; }
            });

            const halfLife = (Math.log(2) / 0.5).toFixed(1);

            return (
                <div className="glass-card space-y-4">
                    <h2 className="text-[12px] font-semibold text-text_secondary uppercase tracking-widest mb-4">Automated Behavioral Insights</h2>

                    <div className="bg-background_secondary p-4 rounded-[12px] border border-border_subtle flex gap-4 items-start transition-all hover:bg-card_elevated">
                        <div className="text-warning_accent text-xl mt-0.5">⚠️</div>
                        <div>
                            <div className="text-[14px] font-bold text-text_primary">Peak Vulnerability: {worstPeriod}</div>
                            <div className="text-[13px] text-text_secondary mt-1 max-w-[90%] leading-relaxed">Capture probability increases by {(worstRisk * 100).toFixed(0)}% during {worstPeriod} sessions compared to baseline.</div>
                        </div>
                    </div>

                    <div className="bg-background_secondary p-4 rounded-[12px] border border-border_subtle flex gap-4 items-start transition-all hover:bg-card_elevated">
                        <div className="text-cyan_accent text-xl mt-0.5">🧠</div>
                        <div>
                            <div className="text-[14px] font-bold text-text_primary">Cognitive Recovery Rate</div>
                            <div className="text-[13px] text-text_secondary mt-1 max-w-[90%] leading-relaxed">It requires <strong>{halfLife} hours</strong> of cognitive rest for latent capture probability to reset to baseline.</div>
                        </div>
                    </div>

                    <div className="bg-background_secondary p-4 rounded-[12px] border border-border_subtle flex gap-4 items-start transition-all hover:bg-card_elevated">
                        <div className="text-danger_accent text-xl mt-0.5">⛓️</div>
                        <div>
                            <div className="text-[14px] font-bold text-text_primary">Scroll Inertia Model</div>
                            <div className="text-[13px] text-text_secondary mt-1 max-w-[90%] leading-relaxed">Passive state retention is at <strong>{(A11 * 100).toFixed(1)}%</strong>, indicating high probability of continuing scroll events without conscious intent.</div>
                        </div>
                    </div>
                </div>
            );
        };

        const Dashboard = () => {
            const [rawData, setRawData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            useEffect(() => {
                const handleData = (parsed) => {
                    console.log("React executing JSON payload", parsed);
                    if (parsed.error) {
                        setError(parsed.error);
                    } else if (parsed.sessions && parsed.sessions.length > 0) {
                        setRawData(parsed);
                        setError(null);
                    } else {
                        setError("No sufficient data yet. Scroll a few more reels!");
                    }
                    setLoading(false);
                };

                window.reactDataCallback = handleData;
                if (window.injectedJsonData) {
                    handleData(window.injectedJsonData);
                }

                const timer = setTimeout(() => {
                    if (!window.injectedJsonData) {
                        setLoading(false);
                        setError("Waiting for Tracker injection... (Make sure accessibility service is active and you have scrolled Reels)");
                    }
                }, 10000);
                return () => clearTimeout(timer);
            }, []);

            if (loading) return <div className="min-h-screen flex items-center justify-center"><div className="w-10 h-10 border-4 border-slate-700 border-t-cyan-400 rounded-full animate-spin"></div></div>;
            if (error) return <div className="min-h-screen flex items-center justify-center flex-col gap-4 text-slate-300">⚠️ {error}</div>;
            if (!rawData) return <div className="min-h-screen flex items-center justify-center">Initializing Engine...</div>;

            const A = rawData.model_parameters.transition_matrix;

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8 md:pt-12 space-y-8 fade-in text-text_primary">
                    <header className="mb-10 relative">
                        <div className="absolute -inset-1 bg-cyan_accent/20 blur-3xl opacity-30 animate-pulse rounded-full pointer-events-none"></div>
                        <h1 className="text-3xl md:text-4xl font-black text-text_primary tracking-tighter relative z-10">Reelio</h1>
                        <p className="text-cyan_accent font-mono text-[10px] md:text-[11px] uppercase tracking-[0.25em] mt-2 font-medium relative z-10">Continuous Latent State Engine</p>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
                        <div className="lg:col-span-1 space-y-6">
                            <CognitiveStabilityScore sessions={rawData.sessions} A11={A[1][1]} />
                            <div className="grid grid-cols-2 lg:grid-cols-1 gap-4">
                                <div className="glass-card flex flex-col justify-center">
                                    <div className="text-3xl font-bold text-text_primary">{rawData.timeline?.p_capture?.length || 0}</div>
                                    <div className="text-[10px] text-text_muted uppercase tracking-widest mt-2">Total Reels Analyzed</div>
                                </div>
                                <div className="glass-card flex flex-col justify-center">
                                    <div className="text-3xl font-bold text-text_primary">{(rawData.model_parameters.regime_stability_score || 0).toFixed(1)}</div>
                                    <div className="text-[10px] text-text_muted uppercase tracking-widest mt-2">Expected Capture Dur. (Reels)</div>
                                </div>
                            </div>
                        </div>

                        <div className="lg:col-span-3 space-y-6 flex flex-col">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 h-[280px]">
                                <div className="h-full"><TransitionMatrixVisualizer matrix={A} /></div>
                                <div className="h-full"><HeatmapCalendar sessions={rawData.sessions} /></div>
                            </div>
                        </div>
                    </div>

                    <div className="w-full">
                        <TimelinePlayback timeline={rawData.timeline} />
                    </div>

                    <div className="w-full">
                        <TriggerInsights sessions={rawData.sessions} A11={A[1][1]} />
                    </div>

                    <footer className="pt-12 pb-6 text-center font-mono text-[10px] text-text_muted uppercase tracking-widest">
                        Reelio Behavioral Research V2 • Time-Decayed HMM Pipeline
                    </footer>

                    <style>{`
            .fade-in { animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
            @keyframes fadeIn { from { opacity: 0; transform: scale(0.98) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
            input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #22D3EE; cursor: pointer; box-shadow: 0 0 10px rgba(34,211,238,0.5); border: 2px solid #0B1220; }
            input[type=range] { margin: 8px 0; }
            `}</style>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);

    </script>
</body>

</html>
