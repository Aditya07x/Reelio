<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#060810;overflow-x:hidden}
#root{width:100%;min-height:100vh}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif}
.mono{font-family:'Courier New',Courier,monospace}
.app-shell{width:100%;min-height:100vh;background:#060810;color:#D0DCF0;position:relative;overflow:hidden;max-width:500px;margin:0 auto}
.glow-doom{box-shadow:0 0 40px rgba(255,45,85,0.15),0 0 80px rgba(255,45,85,0.06)}

@keyframes ring-out{0%{transform:scale(1);opacity:0.7}100%{transform:scale(1.8);opacity:0}}
@keyframes slide-up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes scan-line{0%{top:-2px}100%{top:100%}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes spin{to{transform:rotate(360deg)}}
.pulse{animation:pulse-dot 2s ease-in-out infinite}
.slide-up{animation:slide-up 0.5s ease both}
.float{animation:float 3s ease-in-out infinite}
.scan{position:absolute;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,229,200,0.53),transparent);animation:scan-line 5s linear infinite;pointer-events:none}
.card{background:rgba(16,22,42,0.9);border:1px solid rgba(0,229,200,0.1);border-radius:16px;backdrop-filter:blur(20px);position:relative;overflow:hidden}
.card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,229,200,0.03) 0%,transparent 60%);pointer-events:none}
.card-hot{border-color:rgba(255,45,85,0.35)}
.card-hot::before{content:'';position:absolute;inset:-1px;border-radius:17px;background:transparent;box-shadow:0 0 30px rgba(255,45,85,0.2),inset 0 0 30px rgba(255,45,85,0.03);pointer-events:none}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#3D4F6B;border-radius:2px}
.btn-primary{width:100%;padding:18px;border-radius:16px;border:none;cursor:pointer;font-family:inherit;font-size:16px;font-weight:700;letter-spacing:0.03em;background:linear-gradient(135deg,#00E5C8,#00B8A4);color:#020A0A;position:relative;overflow:hidden;transition:transform 0.15s ease}
.btn-primary:active{transform:scale(0.98)}
input[type=range]{-webkit-appearance:none;width:100%;height:3px;border-radius:2px;background:rgba(0,229,200,0.2);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#00E5C8;box-shadow:0 0 10px #00E5C8;cursor:pointer}
.tab-bar{position:sticky;bottom:0;background:rgba(6,8,16,0.95);backdrop-filter:blur(20px);border-top:1px solid rgba(0,229,200,0.1);display:flex}
.tab-item{flex:1;padding:12px 8px 16px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:transparent;color:#3D4F6B;font-family:inherit;font-size:10px;transition:color 0.2s}
.tab-item.active{color:#00E5C8}
</style>
</head>
