<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Reelio</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #05050A;
      overflow-x: hidden
    }

    #root {
      width: 100%;
      min-height: 100vh
    }

    body {
      font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif
    }

    .mono {
      font-family: 'Share Tech Mono', 'Courier New', monospace
    }

    .spacemono {
      font-family: 'Space Mono', monospace
    }

    .app-shell {
      width: 100%;
      min-height: 100vh;
      background: #05050A;
      color: #D0DCF0;
      position: relative;
      overflow: hidden;
      max-width: 500px;
      margin: 0 auto;
    }

    /* Cyber grid */
    .app-shell::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(to right, rgba(13, 223, 242, 0.04) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(13, 223, 242, 0.04) 1px, transparent 1px);
      background-size: 20px 20px;
      pointer-events: none;
      z-index: 0;
    }

    /* Top bloom */
    .app-shell::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 180px;
      background: linear-gradient(to bottom, rgba(13, 223, 242, 0.06), transparent);
      pointer-events: none;
      z-index: 0;
    }

    /* Scanlines */
    .scanlines {
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0) 50%, rgba(0, 0, 0, 0.07) 50%);
      background-size: 100% 4px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.35;
    }

    @keyframes pulse-dot {

      0%,
      100% {
        opacity: 1;
        transform: scale(1)
      }

      50% {
        opacity: .4;
        transform: scale(.8)
      }
    }

    @keyframes ring-out {
      0% {
        transform: scale(1);
        opacity: .7
      }

      100% {
        transform: scale(1.8);
        opacity: 0
      }
    }

    @keyframes slide-up {
      from {
        opacity: 0;
        transform: translateY(16px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes scan-line {
      0% {
        top: -2px
      }

      100% {
        top: 100%
      }
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-3px)
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    @keyframes ping-slow {

      0%,
      100% {
        transform: scale(1);
        opacity: .75
      }

      50% {
        transform: scale(1.6);
        opacity: 0
      }
    }

    .pulse {
      animation: pulse-dot 2s ease-in-out infinite
    }

    .slide-up {
      animation: slide-up .5s ease both
    }

    .float {
      animation: float 3s ease-in-out infinite
    }

    .ping {
      animation: ping-slow 2s ease-in-out infinite
    }

    .scan {
      position: absolute;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(13, 223, 242, 0.5), transparent);
      animation: scan-line 5s linear infinite;
      pointer-events: none;
    }

    /* Base card */
    .card {
      background: rgba(10, 17, 20, 0.85);
      border: 1px solid rgba(13, 223, 242, 0.12);
      border-radius: 16px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      position: relative;
      overflow: hidden;
    }

    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(13, 223, 242, 0.03) 0%, transparent 60%);
      pointer-events: none;
      border-radius: inherit;
    }

    /* Magenta doom card */
    .card-doom {
      background: rgba(26, 11, 21, 0.85);
      border-color: rgba(242, 13, 166, 0.35);
    }

    .card-doom::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #f20da6, transparent);
      opacity: .7;
    }

    /* Red danger card */
    .card-danger {
      border-color: rgba(255, 45, 85, 0.35)
    }

    .card-danger::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #FF2D55, transparent);
      opacity: .5;
    }

    ::-webkit-scrollbar {
      width: 3px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: #3D4F6B;
      border-radius: 2px
    }

    .btn-primary {
      width: 100%;
      padding: 18px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: .03em;
      background: linear-gradient(135deg, #0ddff2, #00B8A4);
      color: #020A0A;
      position: relative;
      overflow: hidden;
      transition: transform .15s ease;
      box-shadow: 0 8px 32px rgba(13, 223, 242, 0.25);
    }

    .btn-primary:active {
      transform: scale(.98)
    }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 3px;
      border-radius: 2px;
      background: rgba(13, 223, 242, 0.2);
      outline: none;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #0ddff2;
      box-shadow: 0 0 10px #0ddff2;
      cursor: pointer;
    }

    .tab-bar {
      position: sticky;
      bottom: 0;
      background: rgba(5, 5, 10, 0.97);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(13, 223, 242, 0.1);
      display: flex;
    }

    .tab-item {
      flex: 1;
      padding: 12px 8px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
      border: none;
      background: transparent;
      color: #3D4F6B;
      font-family: 'Space Grotesk';
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .05em;
      transition: color .2s;
    }

    .tab-item.active {
      color: #0ddff2
    }

    .tab-item.active svg {
      filter: drop-shadow(0 0 6px #0ddff2)
    }

    /* Driver progress bar */
    .driver-bar {
      height: 5px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 3px;
      overflow: hidden;
    }

    .driver-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 1s ease
    }
  </style>
</head>

<body>
  <div id="root">
    <div
      style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#05050A;gap:16px">
      <div
        style="width:40px;height:40px;border:3px solid rgba(13,223,242,0.15);border-top-color:#0ddff2;border-radius:50%;animation:spin .8s linear infinite">
      </div>
      <div class="mono" style="color:#3D4F6B;font-size:11px;letter-spacing:.2em">REELIO</div>
    </div>
  </div>
  <script src="react.min.js"></script>

        /* ── Derive session data ── */
        var mr = rawData.sessions[rawData.sessions.length - 1];
        var allSt = rawData.sessions.map(function (s) { return s.S_t; });
        var avgSt = allSt.reduce(function (a, b) { return a + b; }, 0) / rawData.sessions.length;
        var A = (rawData.model_parameters && rawData.model_parameters.transition_matrix) || [[0.8, 0.2], [0.2, 0.8]];

        var totalDwellSec = rawData.sessions.reduce(function (sum, s) { return sum + (s.avgDwell || s.meanDwell || s.avg_dwell || 0) * (s.nReels || 0); }, 0);
        var totalDwellMin = totalDwellSec > 60 ? (totalDwellSec / 60).toFixed(1) + "m" : Math.round(totalDwellSec) + "s";
        var overallAvgDwell = (rawData.sessions.reduce(function (sum, s) { return sum + (s.avgDwell || s.meanDwell || s.avg_dwell || 0); }, 0) / Math.max(rawData.sessions.length, 1)).toFixed(1);
        var perReelCapture = ((rawData.timeline && rawData.timeline.p_capture) || [])
          .filter(function (v) { return typeof v === 'number' && isFinite(v); })
          .map(function (v) { return Math.max(0, Math.min(1, v)); }); // clamp [0,1]
        var sessionReelsSum = rawData.sessions.reduce(function (sum, s) { return sum + (s.nReels || 0); }, 0);
        var totalReelsAll = sessionReelsSum > 0 ? sessionReelsSum : perReelCapture.length;
        var escapeRate = Math.max(0.01, A[1][0]);
        var avgNReels = totalReelsAll / Math.max(rawData.sessions.length, 1);
        var pLostTrack = rawData.sessions.filter(function (s) { return s.dominantState === 1; }).length / Math.max(rawData.sessions.length, 1);

        var doomComponents = {
          length: Math.min(1, avgNReels / 80),
          volitional_conflict: pLostTrack,
          rapid_reentry: Math.min(1, A[0][1] * 3),
          automaticity: Math.min(1, A[1][1]),
          dwell_collapse: Math.min(1, Math.max(0, 1 - (parseFloat(overallAvgDwell) / 15))),
          rewatch: pLostTrack,
          environment: mr.timePeriod === "Late Night" || mr.timePeriod === "Night" ? 0.8 : mr.timePeriod === "Evening" ? 0.55 : 0.3
        };

        var timePeriodAvgCapture = (function () {
          if (!mr.timePeriod) return mr.S_t;
          var tpSess = rawData.sessions.filter(function (s) { return s.timePeriod === mr.timePeriod; });
          if (!tpSess.length) return mr.S_t;
          return tpSess.reduce(function (a, b) { return a + b.S_t; }, 0) / tpSess.length;
        })();

        var session = Object.assign({}, mr, {
          doom_label: riskLabel(mr.S_t),
          doom_score: mr.S_t,
          model_confidence: rawData.model_confidence != null ? rawData.model_confidence : Math.min(0.95, rawData.sessions.length / 20),
          doom_pull_index_num: (A[0][1] / Math.max(0.01, A[1][0])),
          doom_pull_index: (A[0][1] / Math.max(0.01, A[1][0])).toFixed(1),
          regime_stability: 1.0 / (escapeRate + 0.001),
          sessions_today: rawData.sessions.length,
          total_doom_sessions: rawData.sessions.filter(function (s) { return s.S_t > 0.65; }).length,
          total_interactions: rawData.sessions.reduce(function (acc, s) { return acc + (s.likes || 0) + (s.comments || 0) + (s.shares || 0) + (s.saves || 0); }, 0),
          total_dwell_today_min: totalDwellMin,
          capture_rate: pLostTrack,
          time_period_avg_capture: timePeriodAvgCapture,
          neural_load: mr.S_t,
          intervention_score: Math.min(1.0, (mr.S_t > 0.5 ? 0.5 : 0) + pLostTrack),
          total_doom_reels: totalReelsAll > 0 ? Math.round(rawData.sessions.reduce(function (acc, s) { return acc + (s.nReels || 0) * s.S_t; }, 0)) : 0,
          A: A,
          doom_components: doomComponents
        });

        var latestSessionRaw = rawData.sessions[rawData.sessions.length - 1];
        var liveReels = latestSessionRaw.nReels || 0;
        var liveAvgDwell = parseFloat(latestSessionRaw.avgDwell || latestSessionRaw.meanDwell || latestSessionRaw.avg_dwell || 0);
        var liveDwellSec = liveAvgDwell * liveReels;
        var lM = Math.floor(liveDwellSec / 60);
        var lS = Math.round(liveDwellSec % 60);
        var live = {
          duration: lM > 0 ? lM + "m " + lS + "s" : lS + "s",
          reels: liveReels,
          avg_dwell: liveAvgDwell.toFixed(1)
        };

        var reelsData = perReelCapture.length > 0
          ? perReelCapture.map(function (p, i) { return { r: "Reel " + (i + 1), p: p, exit: false, back: false }; })
          : rawData.sessions.map(function (s, i) { return { r: "Session " + (i + 1), p: s.S_t, exit: s.dominantState === 1 && i === rawData.sessions.length - 1, back: false }; });

        var days14 = (function () {
          var names = ["S", "M", "T", "W", "T", "F", "S"];
          var today = new Date().getDay();
          var sessions14 = rawData.sessions.slice(-14);
          var base = sessions14.map(function (s, i) {
            var daysAgo = sessions14.length - 1 - i;
            var dIdx = ((today - daysAgo) % 7 + 7) % 7;
            return { d: names[dIdx], v: parseFloat(s.S_t.toFixed(2)) };
          });
          var needed = 14 - base.length;
          for (var i = needed; i >= 1; i--) {
            var dIdx = ((today - (base.length + i - 1)) % 7 + 7) % 7;
            base.unshift({ d: names[dIdx], v: parseFloat(avgSt.toFixed(2)) });
          }
          return base;
        })();

        var tabs = [{ id: "home", icon: "Eye", label: "Monitor" }, { id: "dashboard", icon: "BarChart2", label: "Dashboard" }, { id: "settings", icon: "Settings", label: "Settings" }];

        return e("div", { style: { display: "flex", justifyContent: "center", minHeight: "100vh", background: "#000", alignItems: "flex-start" } },
          e("div", { className: "app-shell", style: { position: "relative" } },
            e("div", { className: "scanlines" }),
            e("div", { className: "scan" }),
            /* Top nav */
            e("div", { style: { height: 44, display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 20px", position: "sticky", top: 0, zIndex: 100, background: "rgba(5,5,10,0.92)", backdropFilter: "blur(20px)", borderBottom: "1px solid " + D.border } },
              screen === "dashboard"
                ? e("button", { onClick: function () { setScreen("home"); }, style: { background: "none", border: "none", cursor: "pointer", display: "flex", alignItems: "center", gap: 4, color: D.safe, fontFamily: "inherit", fontSize: 13, fontWeight: 600 } },
                  e(Ico, { name: "ArrowLeft", size: 16, color: D.safe }), " Home")
                : e("div", { className: "mono", style: { fontSize: 11, color: D.muted } }, "v3.0"),
              e("div", { className: "mono", style: { fontSize: 11, color: D.muted } }, "SYNCED")
            ),
            /* Content */
            e("div", { style: { overflowY: "auto", height: "calc(100vh - 44px - 56px)" } },
              screen === "home"
                ? e(HomeScreen, { onNav: setScreen, session: session, live: live, isServiceActive: svcActive, totalReelsAll: totalReelsAll })
                : screen === "dashboard"
                  ? e(DashboardScreen, { session: session, reelsData: reelsData, days14: days14, circadian: rawData.circadian || [], totalReelsAll: totalReelsAll, avgNReels: avgNReels })
                  : e(SettingsScreen, { onNav: setScreen })
            ),
            /* Tab bar */
            e("div", { className: "tab-bar" },
              tabs.map(function (tab) {
                return e("button", { key: tab.id, className: "tab-item" + (screen === tab.id ? " active" : ""), onClick: function () { setScreen(tab.id); } },
                  e(Ico, { name: tab.icon, size: 20, color: screen === tab.id ? D.safe : D.muted }),
                  e("span", null, tab.label)
                );
              })
            )
          )
        );
      }

      /* ── Android bridge ── */
      window.injectDataB64 = function (b64) {
        try { var parsed = JSON.parse(atob(b64)); }
        catch (ex) { parsed = { error: "Parse error: " + ex.message }; }
        window.injectedJsonData = parsed;
        if (window.reactDataCallback) window.reactDataCallback(parsed);
      };
      window.injectData = function (jsonStr) {
        try { var parsed = JSON.parse(jsonStr); }
        catch (ex) { parsed = { error: "JSON parse error: " + ex.message }; }
        window.injectedJsonData = parsed;
        if (window.reactDataCallback) window.reactDataCallback(parsed);
      };

      var root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(e(ReeliApp, null));
    })();
  </script>
</body>

</html>
